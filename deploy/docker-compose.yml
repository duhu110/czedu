services:
  czedu:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    image: czedu:postgres
    container_name: czedu
    restart: unless-stopped
    environment:
      NODE_ENV: production
      TZ: Asia/Shanghai
      PGTZ: Asia/Shanghai
      HOSTNAME: 0.0.0.0
      PORT: ${PORT:-3000}
      DATABASE_URL: ${DATABASE_URL:?Set DATABASE_URL in deploy/.env}
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET in deploy/.env}
      PRISMA_DB_PUSH: ${PRISMA_DB_PUSH:-true}
    ports:
      - "127.0.0.1:${APP_PORT:-3002}:3000"
    volumes:
      - type: bind
        source: ${UPLOAD_HOST_DIR:-/home/oss/xnczjyj}
        target: /app/public/uploads
    networks:
      - postgres-network

networks:
  postgres-network:
    external: true
    name: ${POSTGRES_DOCKER_NETWORK:-postgres_net}
